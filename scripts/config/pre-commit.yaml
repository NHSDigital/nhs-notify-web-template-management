repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0 # Use the ref you want to point at
    hooks:
      - id: trailing-whitespace
        exclude: |
          (?x)^(
            frontend/src/__tests__/.*\.tsx\.snap |
            frontend/src/__tests__/utils/markdownit/fixtures/index\.ts
          )$
      - id: detect-aws-credentials
        args: [--allow-missing-credentials]
      - id: check-added-large-files
      - id: check-symlinks
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: forbid-new-submodules
      - id: mixed-line-ending
      - id: pretty-format-json
        exclude: |
          (?x)^(
            .*/?package-lock.json |
            packages/event-schemas/schemas/[^/]+/[^/]+\.json |
            packages/event-schemas/examples/[^/]+/[^/]+/[^/]+\.json
          )$
        args: ['--autofix']

  - repo: https://github.com/NHSDigital/nhs-notify-shared-modules
    rev: 3.0.8
    hooks:
      - id: sort-dictionary
      - id: scan-secrets
        args: [check=whole-history]
      - id: check-file-format
        args: [check=branch, exclude=frontend/src/__tests__/utils/markdownit/fixtures/index.ts]
      - id: check-markdown-format
        args: [check=branch]
      - id: check-english-usage
        args: [check=branch]
      - id: lint-terraform
      - id: generate-terraform-docs
      - id: check-todo-usage
        args: [check=branch]
